<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>

<h2>Register</h2>

<form id="registerForm">
    <input type="text" id="username" required placeholder="Username"><br><br>
    <input type="password" id="password" required placeholder="Password"><br><br>
    <button type="submit">Daftar</button>
</form>

<p id="message"></p>

<script>
document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    const res = await fetch("https://herisusanta.my.id/javalogin/api/auth.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `action=register&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
    });

    const data = await res.json();

    if (data.status === "success") {
        document.getElementById("message").innerText = "Registrasi berhasil, silakan login";
    } else {
        document.getElementById("message").innerText = data.message || "Gagal register";
    }
});
</script>

</body>
</html>
